# -----------------------------------------------
# Cherry Pi Docker Compose File
# -----------------------------------------------
name: cherry

# -----------------------------------------------
# Networks
# -----------------------------------------------
networks:
  frontend:
    name: frontend
  backend:
    name: backend

# -----------------------------------------------
# Volumes
# -----------------------------------------------
volumes:
  grafana_data:
    name: grafana_data

# -----------------------------------------------
# Services
# -----------------------------------------------

services:
# ----------------- Definitions -----------------
x-op-app-restart-policy: &app_restart_policy
  restart: unless-stopped

# ----------------- Cloudflared -----------------
  cloudflare-tunnel:
    <<: [*app-restart-policy]
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    hostname: cloudflare-tunnel
    command: tunnel run
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./cloudflare/hosts:/etc/hosts:ro
    environment:
      - 'TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}'
    networks:
      - frontend
    healthcheck:
      test: ['CMD', 'cloudflared', '--version']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ------------------ Grafana --------------------
  grafana:
    <<: [*app-restart-policy]
    image: grafana/grafana:${GRAFANA_VERSION:-13.0}
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://${GRAFANA_HOST:-localhost}:${GRAFANA_PORT:-3000}
      - INFLUXDB_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN:-changeme}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - influxdb2
      - telegraf
    networks:
      backend:
      frontend:

# ----------------- Prometheus -------------------
  prometheus:
    <<: [*app-restart-policy]
    image: prom/prometheus:${PROMETHEUS_VERSION:-latest}
    environment:
      - PROMETHEUS_CONFIGURATION_FILE=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      backend:
      frontend: